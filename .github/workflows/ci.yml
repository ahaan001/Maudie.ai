name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: compliance_user
          POSTGRES_PASSWORD: compliance_pass
          POSTGRES_DB: compliance_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://compliance_user:compliance_pass@localhost:5432/compliance_db_test
      TEST_DATABASE_URL: postgresql://compliance_user:compliance_pass@localhost:5432/compliance_db_test
      AUTH_SECRET: ci-test-secret-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: psql $DATABASE_URL -f src/lib/db/migrations/0000_init.sql

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npx vitest run src/__tests__/unit --reporter=verbose

      - name: Integration tests
        run: npx vitest run src/__tests__/integration --reporter=verbose
