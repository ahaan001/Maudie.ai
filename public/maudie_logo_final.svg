<svg width="1100" height="280" viewBox="0 0 1100 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">maudie.ai logo</title>
  <desc id="desc">maudie.ai — AI-powered engineering intelligence platform logo with teal network icon and medical color palette.</desc>

  <defs>
    <style>
      .wordmark-main {
        font-family: Inter, "DM Sans", "Segoe UI", Arial, sans-serif;
        font-size: 108px;
        font-weight: 600;
        letter-spacing: -2px;
        fill: #1B3A5C;
      }
      .wordmark-ai {
        font-family: Inter, "DM Sans", "Segoe UI", Arial, sans-serif;
        font-size: 108px;
        font-weight: 600;
        letter-spacing: -2px;
        fill: #00C9C8;
      }
    </style>

    <!-- Teal glow filter for center node -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ICON: Modular multi-agent network           -->
  <!-- Medical teal palette                         -->
  <!-- ═══════════════════════════════════════════ -->

  <g transform="translate(30, 30)">

    <!-- Connector lines (rendered first, behind nodes) -->
    <!-- Spokes from center hub to outer nodes -->
    <line x1="110" y1="110" x2="30"  y2="30"  stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="110" y2="18"  stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="190" y2="30"  stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="202" y2="110" stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="190" y2="190" stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="110" y2="202" stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="30"  y2="190" stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="110" y1="110" x2="18"  y2="110" stroke="#00C9C8" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Outer ring connector arcs (partial ring connecting outer nodes) -->
    <circle cx="110" cy="110" r="95" fill="none" stroke="#00C9C8" stroke-width="2" stroke-dasharray="12 10" opacity="0.28"/>

    <!-- Outer satellite nodes (8 around the ring) -->
    <circle cx="30"  cy="30"  r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="110" cy="18"  r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="190" cy="30"  r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="202" cy="110" r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="190" cy="190" r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="110" cy="202" r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="30"  cy="190" r="11" fill="#00C9C8" opacity="0.85"/>
    <circle cx="18"  cy="110" r="11" fill="#00C9C8" opacity="0.85"/>

    <!-- Inner connector ring -->
    <circle cx="110" cy="110" r="48" fill="none" stroke="#00C9C8" stroke-width="2.5" opacity="0.35"/>

    <!-- Inner secondary nodes -->
    <circle cx="110" cy="62"  r="7" fill="#0096C7" opacity="0.9"/>
    <circle cx="152" cy="80"  r="7" fill="#0096C7" opacity="0.9"/>
    <circle cx="158" cy="128" r="7" fill="#0096C7" opacity="0.9"/>
    <circle cx="128" cy="158" r="7" fill="#0096C7" opacity="0.9"/>
    <circle cx="80"  cy="152" r="7" fill="#0096C7" opacity="0.9"/>
    <circle cx="64"  cy="110" r="7" fill="#0096C7" opacity="0.9"/>

    <!-- Centre orchestrator hub -->
    <circle cx="110" cy="110" r="22" fill="#1B3A5C" filter="url(#glow)"/>
    <circle cx="110" cy="110" r="14" fill="#00C9C8"/>
    <circle cx="110" cy="110" r="6"  fill="#ffffff"/>

  </g>

  <!-- ═══════════════════════════════════════════ -->
  <!-- WORDMARK                                     -->
  <!-- ═══════════════════════════════════════════ -->

  <text x="305" y="192" class="wordmark-main">maudie.</text>
  <text x="808" y="192" class="wordmark-ai">ai</text>

  <!-- Subtle underline rule -->
  <line x1="305" y1="212" x2="940" y2="212" stroke="#1B3A5C" stroke-width="2" opacity="0.1"/>

</svg>
